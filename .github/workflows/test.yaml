name: test

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ensure-pinned-actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Ensure all actions are pinned to a full-length commit SHA
        uses: step-security/github-actions-ensure-sha-pinned-actions@e85b3f04e483b6ebf0bea3a67b3770516276171a # v5.0.1

  charts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.21.0

      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version 1.1.0

      - name: Set up kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Lint all charts
        run: |
          for chart in charts/*/; do
            echo "Linting $chart"
            helm lint "$chart"
          done

      - name: Run helm unit tests
        run: |
          helm unittest charts/hatchet-api

      - name: Install and test hatchet-api chart
        run: |
          helm install hatchet-api-test charts/hatchet-api \
            --set-json 'deploymentEnvFrom=[]' \
            --set setupJob.enabled=false \
            --set migrationJob.enabled=false \
            --set seedJob.enabled=false \
            --set quickstartJob.enabled=false \
            --set workerTokenJob.enabled=false \
            --set ingress.enabled=false \
            --timeout=1m

          kubectl get pods -l app.kubernetes.io/name=hatchet-api
          helm test hatchet-api-test || true
          helm uninstall hatchet-api-test

      - name: Install and test hatchet-frontend chart
        run: |
          helm install hatchet-frontend-test charts/hatchet-frontend \
            --set ingress.enabled=false \
            --timeout=1m

          kubectl get pods -l app.kubernetes.io/name=hatchet-frontend
          helm test hatchet-frontend-test || true
          helm uninstall hatchet-frontend-test

      - name: Install and test hatchet-stack chart
        run: |
          helm dependency build charts/hatchet-stack

          helm install hatchet-stack-test charts/hatchet-stack \
            --set postgres.enabled=false \
            --set rabbitmq.enabled=false \
            --timeout=1m

          kubectl get pods
          helm test hatchet-stack-test || true

          helm uninstall hatchet-stack-test || true
      - name: Template test all charts
        run: |
          helm dependency build charts/hatchet-stack
          helm dependency build charts/hatchet-api
          helm dependency build charts/hatchet-frontend
          helm dependency build charts/hatchet-ha

          for chart in charts/*/; do
            chart_name=$(basename "$chart")
            echo "Testing template rendering for $chart_name"

            case "$chart_name" in
              "hatchet-stack")
                helm template test-release "$chart" > /dev/null
                ;;
              "hatchet-api"|"hatchet-frontend")
                helm template test-release "$chart" > /dev/null
                ;;
              "hatchet-ha")
                helm template test-release "$chart" > /dev/null
                ;;
            esac

            echo "✓ Template rendering successful for $chart_name"
          done

  migration-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.21.0

      - name: Set up kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Install postgres
        run: |
          helm install pg bitnami/postgresql \
            --set image.repository=bitnamilegacy/postgresql \
            --set global.security.allowInsecureImages=true \
            --set auth.username=hatchet \
            --set auth.password=hatchet \
            --set auth.database=hatchet \
            --set tls.enabled=false \
            --set primary.extendedConfiguration="timezone = 'UTC'" \
            --wait --timeout=5m

      - name: Pre-create hatchet-config Secret with server-level config
        run: |
          # The chart's default deploymentEnvFrom points at "hatchet-config".
          # When installed via hatchet-stack this Secret is rendered for you;
          # standalone we supply it here. The setup Job (quickstartJob,
          # enabled by default) will UPDATE this Secret in-place via
          # `hatchet-admin k8s quickstart` to add the random
          # SERVER_AUTH_COOKIE_SECRETS and Tink SERVER_ENCRYPTION_* keysets.
          # SERVER_MSGQUEUE_KIND=postgres swaps the default rabbitmq message
          # queue for the postgres-backed one, so we don't have to install
          # RabbitMQ just to bring the API up.
          kubectl create secret generic hatchet-config \
            --from-literal=DATABASE_URL='postgres://hatchet:hatchet@pg-postgresql:5432/hatchet?sslmode=disable' \
            --from-literal=SERVER_URL='http://localhost:8080' \
            --from-literal=SERVER_AUTH_COOKIE_DOMAIN='localhost' \
            --from-literal=SERVER_AUTH_COOKIE_INSECURE='t' \
            --from-literal=SERVER_AUTH_SET_EMAIL_VERIFIED='t' \
            --from-literal=SERVER_AUTH_BASIC_AUTH_ENABLED='t' \
            --from-literal=SERVER_GRPC_BROADCAST_ADDRESS='localhost:7070' \
            --from-literal=SERVER_GRPC_INSECURE='t' \
            --from-literal=SERVER_MSGQUEUE_KIND='postgres' \
            --from-literal=ADMIN_EMAIL='admin@example.com' \
            --from-literal=ADMIN_PASSWORD='Admin123!!'

      - name: Install hatchet-api with migrations enabled
        run: |
          # envFrom is wired into the Jobs (the migration init container needs
          # DATABASE_URL); deploymentEnvFrom is wired into the Deployment.
          # Both target hatchet-config so they pick up the keys the setup Job
          # writes back.
          helm install hatchet-api-test charts/hatchet-api \
            --set-json 'envFrom=[{"secretRef":{"name":"hatchet-config"}}]' \
            --set seedJob.enabled=false \
            --set workerTokenJob.enabled=false \
            --set ingress.enabled=false \
            --wait --timeout=10m

      - name: Assert install-time migration completed
        run: |
          kubectl wait --for=condition=complete \
            job -l app.kubernetes.io/instance=hatchet-api-test \
            --timeout=5m

      - name: Assert API Deployment is Ready
        run: |
          kubectl rollout status deploy/hatchet-api-test --timeout=5m

      - name: Helm upgrade (triggers pre-upgrade migration hook)
        # `helm upgrade --wait` synchronously runs the pre-upgrade migration
        # hook Job. If the hook fails, the upgrade fails. On success the hook
        # Job is deleted per its hook-delete-policy (hook-succeeded), so we
        # do NOT `kubectl wait` for it afterward — the upgrade returning 0
        # is the assertion that the hook ran and migrations applied.
        run: |
          helm upgrade hatchet-api-test charts/hatchet-api \
            --set-json 'envFrom=[{"secretRef":{"name":"hatchet-config"}}]' \
            --set seedJob.enabled=false \
            --set workerTokenJob.enabled=false \
            --set ingress.enabled=false \
            --wait --timeout=10m

      - name: Assert API Deployment is Ready after upgrade
        run: |
          kubectl rollout status deploy/hatchet-api-test --timeout=5m

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods,jobs -A
          kubectl describe deploy/hatchet-api-test || true
          kubectl describe job/hatchet-api-test-migration || true
          kubectl logs deploy/hatchet-api-test --tail=200 || true
          kubectl logs deploy/hatchet-api-test --previous --tail=200 || true
          kubectl logs -l job-name=hatchet-api-test-migration --all-containers=true --tail=200 || true

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.latest.outputs.version }}
    steps:
      - name: Resolve latest Hatchet release tag
        id: latest
        run: |
          VERSION=$(curl -sSfL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/hatchet-dev/hatchet/releases/latest \
            | jq -r '.tag_name')
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Failed to resolve latest Hatchet release tag" >&2
            exit 1
          fi
          echo "Latest Hatchet release tag: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  loadtest-stack:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Set up kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Run load test
        run: |
          ./hack/kind-stack-loadtest.sh
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}

  loadtest-ha:
    needs: resolve-version
    runs-on: hatchet-arm64-2
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Create kind config
        run: |
          cat <<EOF > kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF

      - name: Set up kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: kind-config.yaml

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Run load test
        run: |
          ./hack/kind-ha-loadtest.sh
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Checkov action
        uses: bridgecrewio/checkov-action@4a1afa9897f7afe297a3762c926e1e800361464f # v12.3111.0
        with:
          directory: charts/
          framework: kubernetes
          output_format: sarif
          output_file_path: reports/results.sarif
          skip_check: CKV_K8S_40,CKV_K8S_43

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        if: always()
        with:
          sarif_file: reports/results.sarif

  upgrade-e2e:
    # Install the latest published chart, then upgrade to the chart in this PR
    # and assert nothing breaks (the pre-upgrade migration hook runs and all
    # workloads come back Ready).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - hatchet-stack
          - hatchet-ha
    env:
      RELEASE: upgrade-test
      NAMESPACE: upgrade-test
      VALUES: charts/${{ matrix.chart }}/ci/ct-values.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.21.0

      - name: Set up kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add hatchet https://hatchet-dev.github.io/hatchet-charts
          helm repo update

      - name: Install previously released ${{ matrix.chart }}
        run: |
          PREV=$(helm search repo "hatchet/${{ matrix.chart }}" --output json | jq -r '.[0].version')
          if [[ -z "$PREV" || "$PREV" == "null" ]]; then
            echo "Could not resolve a published version of ${{ matrix.chart }}" >&2
            exit 1
          fi
          echo "Installing previously released version: $PREV"
          helm install "$RELEASE" "hatchet/${{ matrix.chart }}" \
            --version "$PREV" \
            --namespace "$NAMESPACE" --create-namespace \
            -f "$VALUES" \
            --wait --timeout=10m

      - name: Build local chart dependencies
        run: helm dependency build "charts/${{ matrix.chart }}"

      - name: Upgrade to the chart in this PR
        # --wait runs the pre-upgrade migration hook synchronously and blocks
        # until every workload is Ready again; a non-zero exit fails the job.
        run: |
          helm upgrade "$RELEASE" "charts/${{ matrix.chart }}" \
            --namespace "$NAMESPACE" \
            -f "$VALUES" \
            --wait --timeout=10m

      - name: Assert all workloads are Ready after upgrade
        run: |
          for d in $(kubectl get deploy -n "$NAMESPACE" -o name); do
            kubectl rollout status "$d" -n "$NAMESPACE" --timeout=5m
          done
          for s in $(kubectl get statefulset -n "$NAMESPACE" -o name); do
            kubectl rollout status "$s" -n "$NAMESPACE" --timeout=5m
          done

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods,jobs,deploy,statefulset -n "$NAMESPACE" -o wide || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -50 || true
          for p in $(kubectl get pods -n "$NAMESPACE" -o name); do
            echo "=== logs $p ==="
            kubectl logs "$p" -n "$NAMESPACE" --all-containers=true --tail=100 || true
          done
