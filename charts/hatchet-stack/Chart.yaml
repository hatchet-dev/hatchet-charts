apiVersion: v2
name: hatchet-stack
description: A Helm chart for deploying Hatchet on Kubernetes.
type: application
version: 0.12.1
home: https://hatchet.run
sources:
  - https://github.com/hatchet-dev/hatchet-charts
  - https://github.com/hatchet-dev/hatchet
keywords:
  - hatchet
  - workflow
  - workflows
  - task-queue
  - orchestration
  - durable-execution
  - background-jobs
maintainers:
  - name: Hatchet Engineering
    email: alexander@hatchet.run
dependencies:
  - name: "hatchet-api"
    condition: api.enabled
    repository: "file://../hatchet-api"
    version: "0.12.1"
    alias: api
  - name: "hatchet-api"
    condition: engine.enabled
    repository: "file://../hatchet-api"
    version: "0.12.1"
    alias: engine
  - name: "hatchet-frontend"
    condition: frontend.enabled
    repository: "file://../hatchet-frontend"
    version: "0.12.1"
    alias: frontend
  - name: "postgresql"
    condition: postgres.enabled
    repository: "https://charts.bitnami.com/bitnami"
    version: "16.7.27"
    alias: postgres
  - name: "rabbitmq"
    condition: rabbitmq.enabled
    repository: "https://charts.bitnami.com/bitnami"
    version: "16.0.14"
    alias: rabbitmq
